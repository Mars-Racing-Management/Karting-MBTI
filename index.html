<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡丁车MBTI测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #fff;
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .screen {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .screen.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 开始页 */
        .start-screen { text-align: center; }
        .title {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff3e3e, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
        }
        .follow-section {
            background: #f8f8f8;
            border-radius: 16px;
            padding: 24px 20px;
            margin-bottom: 25px;
        }
        .follow-title {
            font-size: 15px;
            font-weight: 700;
            color: #333;
            margin-bottom: 16px;
        }
        .follow-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .follow-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .follow-btn.douyin {
            background: #000;
            color: #fff;
        }
        .follow-btn.xhs {
            background: #ff2442;
            color: #fff;
        }
        .follow-btn:hover { transform: scale(1.05); }
        .follow-btn.done {
            opacity: 0.5;
            pointer-events: none;
        }
        .follow-btn.done::after {
            content: " ✓";
        }
        .start-btn {
            background: linear-gradient(135deg, #ff3e3e, #ff8c00);
            border: none;
            color: white;
            padding: 16px 50px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .start-btn:hover { transform: scale(1.05); }
        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .start-hint {
            font-size: 13px;
            color: #999;
            margin-top: 12px;
        }

        /* 题目页 */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            margin-bottom: 30px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3e3e, #ff8c00);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .question-number {
            color: #ff8c00;
            font-size: 13px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .question-text {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.5;
            color: #222;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            background: #f8f8f8;
            border: 1.5px solid #eee;
            border-radius: 14px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-size: 15px;
            line-height: 1.5;
            color: #333;
        }
        .option:hover {
            background: #fff;
            border-color: #ff8c00;
            transform: translateX(8px);
            box-shadow: 0 2px 8px rgba(255,140,0,0.15);
        }

        /* 结果页 */
        .result-screen { text-align: center; }
        .result-image {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            margin: 0 auto 20px;
            display: block;
        }
        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tag {
            background: rgba(255, 36, 66, 0.08);
            color: #ff2442;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .result-desc {
            background: #f8f8f8;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.8;
            color: #555;
            font-size: 15px;
        }
        .restart-btn {
            background: transparent;
            border: 2px solid #ff8c00;
            color: #ff8c00;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .restart-btn:hover {
            background: #ff8c00;
            color: #fff;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #bbb;
            font-size: 12px;
        }

        /* 加载页 */
        .loading { text-align: center; padding: 50px 20px; }
        .loading-spinner {
            width: 45px;
            height: 45px;
            border: 3px solid #eee;
            border-top-color: #ff8c00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* 分享卡片（截图用） */
        .share-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            max-width: 400px;
            text-align: center;
        }
        .share-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 16px;
            display: block;
        }
        .share-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .share-qrcode canvas, .share-qrcode img {
            display: block;
            border-radius: 8px;
        }
        .share-url {
            text-align: left;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        .share-url strong {
            color: #222;
            font-size: 14px;
            display: block;
            margin-bottom: 2px;
        }
        .screenshot-result {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            margin: 0 auto 8px;
            display: block;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .screenshot-hint {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-bottom: 20px;
        }
        .save-btn {
            background: linear-gradient(135deg, #ff3e3e, #ff8c00);
            border: none;
            color: white;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .save-btn:hover { transform: scale(1.05); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 开始页 -->
        <div id="start-screen" class="screen start-screen active">
            <h1 class="title">卡丁车MBTI</h1>
            <p class="subtitle">测测你是哪种赛道生物</p>

            <div class="follow-section">
                <div class="follow-title">关注 Mars Racing 官方账号，开始测试</div>
                <div class="follow-btns">
                    <a class="follow-btn douyin" id="btn-douyin" href="https://www.douyin.com/user/MS4wLjABAAAAKGJr2rZg8Sy1LjovWWtD108jkIIyto7zxBE0jukkrmI" target="_blank">关注抖音号</a>
                    <a class="follow-btn xhs" id="btn-xhs" href="https://www.xiaohongshu.com/user/profile/618187bd0000000010009cf8" target="_blank">关注小红书</a>
                </div>
            </div>

            <button class="start-btn" id="start-btn" onclick="startTest()" disabled>开始测试 →</button>
            <p class="start-hint" id="start-hint">点击上方任意按钮关注后即可开始</p>
            <div class="footer">Mars Racing</div>
        </div>

        <!-- 加载页 -->
        <div id="loading-screen" class="screen">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p style="color:#888;">正在分析你的赛道人格...</p>
            </div>
        </div>

        <!-- 题目页 -->
        <div id="question-screen" class="screen">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="question-number" id="question-number">第 1/12 题</div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options"></div>
        </div>

        <!-- 结果页 -->
        <div id="result-screen" class="screen result-screen">
            <img class="result-image" id="result-image" src="" alt="">

            <!-- 截图结果展示区（点击保存后覆盖人格图位置） -->
            <div id="screenshot-area" style="display:none;">
                <img id="screenshot-img" class="screenshot-result" alt="测试结果截图">
                <p class="screenshot-hint">如未自动保存截图，可长按图片保存</p>
            </div>

            <div class="result-tags" id="result-tags"></div>
            <div class="result-desc" id="result-desc"></div>

            <!-- 隐藏的截图源卡片 -->
            <div id="share-card" class="share-card" style="position:fixed;left:-9999px;top:0;">
                <img class="share-image" id="share-image" src="" alt="">
                <div class="share-footer">
                    <div class="share-qrcode" id="share-qrcode"></div>
                    <div class="share-url">
                        <strong>扫码测试你的赛道人格</strong>
                        https://mars-racing-management.github.io/Karting-MBTI/
                    </div>
                </div>
            </div>

            <button class="save-btn" onclick="saveScreenshot()">保存截图</button>
            <button class="restart-btn" onclick="restartTest()">再测一次</button>
            <div class="footer">Mars Racing</div>
        </div>
    </div>

    <script>
        let hasFollowed = false;
        let countdownTimer = null;
        let countdownSeconds = 15;

        // 倒计时逻辑
        function startCountdown() {
            const btn = document.getElementById('start-btn');
            const hint = document.getElementById('start-hint');
            btn.disabled = true;
            btn.textContent = '开始测试 (' + countdownSeconds + 's)';
            hint.textContent = '关注账号后可立即开始游戏';

            countdownTimer = setInterval(() => {
                countdownSeconds--;
                if (countdownSeconds > 0) {
                    btn.textContent = '开始测试 (' + countdownSeconds + 's)';
                } else {
                    clearInterval(countdownTimer);
                    enableStart(true);
                }
            }, 1000);
        }

        document.getElementById('btn-douyin').addEventListener('click', function() {
            this.classList.add('done');
            this.textContent = '已关注抖音';
            enableStart(false);
        });

        document.getElementById('btn-xhs').addEventListener('click', function() {
            this.classList.add('done');
            this.textContent = '已关注小红书';
            enableStart(false);
        });

        function enableStart(fromCountdown) {
            if (hasFollowed) return;
            hasFollowed = true;

            // 如果有倒计时，清除它
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }

            const btn = document.getElementById('start-btn');
            const hint = document.getElementById('start-hint');

            if (fromCountdown) {
                // 倒计时结束自动启用
                btn.disabled = false;
                btn.textContent = '开始测试 →';
                hint.textContent = '可以开始了！';
                hint.style.color = '#4ade80';
            } else {
                // 点击关注按钮立即启用
                btn.textContent = '页面加载中...';
                hint.textContent = '正在准备...';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = '开始测试 →';
                    hint.textContent = '可以开始了！';
                    hint.style.color = '#4ade80';
                }, 800);
            }
        }

        // 页面加载时启动倒计时
        startCountdown();

        const personalities = {
            '保胎大师': {
                image: './images/保胎大师1.png',
                tags: ['爱胎如命', '温柔驾驶', '稳字当头'],
                desc: '你对轮胎的感情比对自己还好。每次下场都像是在约会，轻踩油门温柔刹车，生怕伤着它们。别人在push极限，你在给轮胎做SPA。虽然圈速不一定最快，但你的轮胎一定是全场最健康的。'
            },
            '割草机': {
                image: './images/割草机1.png',
                tags: ['横冲直撞', '越野狂人', '破坏力MAX'],
                desc: '在你的字典里没有"赛道边界"这个词。草坪、砂石、路肩，哪里都能开，开到哪里都像是在割草。别人开卡丁车，你开的是拉力赛。虽然经常被骂，但你心里清楚——其实你是个拉力车手。'
            },
            '路肩': {
                image: './images/路肩1.png',
                tags: ['路肩收藏家', '极限走线', '轨道车'],
                desc: '你对路肩有着特殊的执念，看到红白相间的东西就想压上去。每一圈都在挑战赛道的边界，走线精准得像轨道车。别人害怕的路肩，是你的甜点。'
            },
            '漂移': {
                image: './images/漂移1.png',
                tags: ['经常打滑', '意外艺术家', '帅就完事'],
                desc: '别人过弯靠技术，你过弯靠运气。每次以为自己是在漂移，其实是在spin。虽然圈速可能因此慢了半秒，但谁在乎呢？帅是一辈子的事，而且你坚信——原来漂移不能攒氮气。'
            },
            '气氛组': {
                image: './images/气氛组1.png',
                tags: ['吃货', '社交天花板', '佛系车手'],
                desc: '你来赛道的真正目的不是开车，是吃饭。练不练车不重要，重要的是练完吃什么。你是围场里的社交中心，走到哪都是欢声笑语。虽然圈速一般，但人气绝对是第一。'
            },
            '汽车人': {
                image: './images/汽车人1.png',
                tags: ['训练狂魔', '模拟器达人', '机械控'],
                desc: '你和卡丁车的关系已经超越了人车合一，你简直就是汽车人。不练车的时候在练模拟器，不练模拟器的时候在研究机械结构。别人问你累不累，你说这才哪到哪。'
            },
            '摄影师': {
                image: './images/摄影师1.png',
                tags: ['拍照狂魔', '围场记者', ' excuses 大师'],
                desc: '你的镜头永远比你的车快。别人在push圈速，你在找最佳拍摄角度。拍糊了？那叫速度感！虽然驾驶技术一般，但你用照片记录了整个围场的精彩瞬间。'
            },
            '数据狂魔': {
                image: './images/数据狂魔1.png',
                tags: ['数据控', '逐帧分析', '0.01秒计较'],
                desc: '你的大脑是一台超级计算机。每次下场都在记录数据，每次回家都在复盘分析。三号弯油门开早了0.02秒？这不能忍！别人靠感觉开车，你靠Excel开车。'
            },
            '小孩哥/小孩姐': {
                image: './images/小孩哥1.png',
                tags: ['天赋型', '年少有为', '教学型'],
                desc: '别看你年轻，技术比你年龄大两轮的人都好。你还在喝奶的年纪就开始教别人过弯了。天赋异禀是你的标签，年少有为是你的日常。别人叫你小孩，你叫别人叔叔阿姨。'
            },
            '鱼雷': {
                image: './images/鱼雷1.png',
                tags: ['弯道杀手', '内线狂魔', '不计后果'],
                desc: '你的眼里只有超车，没有刹车。弯道就是你的武器，内线就是你的家。不管有没有空间，先挤进去再说。虽然经常冲出赛道，但你坚信——弯道不就是用来超车的吗？'
            }
        };

        const questions = [
            {
                text: '跑了几圈，轮胎进入工作温度了，这时候你？',
                options: [
                    { text: '抓紧窗口期多push几圈，机不可失', type: '汽车人' },
                    { text: '差不多了，别把胎造太狠，收着点', type: '保胎大师' },
                    { text: '趁抓地好，试试更激进的线路', type: '割草机' }
                ]
            },
            {
                text: '排队买奶茶有人插你前面，你会？',
                options: [
                    { text: '直接贴上去，寸步不让', type: '路肩' },
                    { text: '开骂，今天这队我排定了', type: '鱼雷' },
                    { text: '先拍照发小红书：家人们谁懂啊', type: '摄影师' }
                ]
            },
            {
                text: '前面是个高速弯，你的走线是？',
                options: [
                    { text: '严格按照理论最佳线路，一寸不差', type: '数据狂魔' },
                    { text: '晚刹车猛给方向，反正甩出去了也是节目效果', type: '漂移' },
                    { text: '压着路肩过，尽量少走弯路', type: '路肩' }
                ]
            },
            {
                text: '手机只剩10%电，但你还在外面，你会？',
                options: [
                    { text: '赶在没电之前，快把要拍的照片拍完', type: '摄影师' },
                    { text: '无所谓，反正我出门主要是为了吃', type: '气氛组' },
                    { text: '立刻开启省电模式，能撑多久算多久', type: '汽车人' }
                ]
            },
            {
                text: '别人问你"卡丁车有啥好玩的"，你怎么回答？',
                options: [
                    { text: '你不懂，那是一种人车合一的感觉', type: '汽车人' },
                    { text: '可以练反应力，对日常开车也有帮助', type: '小孩哥/小孩姐' },
                    { text: '冲出赛道的时候很刺激……', type: '割草机' }
                ]
            },
            {
                text: '做饭发现缺一样食材，你会？',
                options: [
                    { text: '随便找个替代品，反正吃不死', type: '割草机' },
                    { text: '不做了，点外卖', type: '气氛组' },
                    { text: '立刻下楼买，差一样都不是那个味', type: '保胎大师' }
                ]
            },
            {
                text: '场上有个小朋友圈速比你快，你会？',
                options: [
                    { text: '默默让开，现在的年轻人太可怕了', type: '保胎大师' },
                    { text: '上去问他几岁，车是谁调的', type: '小孩哥/小孩姐' },
                    { text: '肯定是抄近道了，我也去找找有没有捷径', type: '割草机' }
                ]
            },
            {
                text: '朋友聚会选餐厅，大家吵起来了，你会？',
                options: [
                    { text: '我拉个表，按口味距离性价比打分', type: '数据狂魔' },
                    { text: '随便，吃啥都行，重点是有人陪我唠嗑', type: '气氛组' },
                    { text: '我知道一家，不好吃的话算我的', type: '割草机' }
                ]
            },
            {
                text: '你的车在某个弯总是推头，你会？',
                options: [
                    { text: '仔细调试赛车，用工程思维解决', type: '数据狂魔' },
                    { text: '负负得正，我来甩个尾吧', type: '漂移' },
                    { text: '换个线路也许会好一点', type: '路肩' }
                ]
            },
            {
                text: '洗完澡发现忘拿毛巾，浴室里只有一件脏衣服，你会？',
                options: [
                    { text: '用脏衣服擦，反正身体是干净的', type: '割草机' },
                    { text: '大声喊人救命', type: '气氛组' },

                ]

                text: '比赛最后一圈，前面就是领奖台位置，你会？',
                options: [
                    { text: '稳住，按自己节奏来，不冒险', type: '保胎大师' },
                    { text: '内线硬挤，过了再说，罚时是赛后的事', type: '鱼雷' },
                    { text: '等直道抽头，干净利落超过去', type: '小孩哥/小孩姐' }
                ]
            },
            {
                text: '坐过站了，你的第一反应是？',
                options: [
                    { text: '打开地图算最优返程方案', type: '数据狂魔' },
                    { text: '算了，看看附近有什么好吃的', type: '气氛组' },
                    { text: '冲下车，哪怕门正在关', type: '鱼雷' }
                ]
            }
        ];

        let currentQuestion = 0;
        let scores = {};

        function startTest() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('question-screen').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-number').textContent = `第 ${currentQuestion + 1}/${questions.length} 题`;
            document.getElementById('question-text').textContent = q.text;
            document.getElementById('progress-fill').style.width = `${(currentQuestion / questions.length) * 100}%`;

            const container = document.getElementById('options');
            container.innerHTML = '';

            q.options.forEach((opt) => {
                const el = document.createElement('div');
                el.className = 'option';
                el.textContent = opt.text;
                el.onclick = () => selectOption(opt.type);
                container.appendChild(el);
            });
        }

        function selectOption(type) {
            scores[type] = (scores[type] || 0) + 1;
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showLoading();
            }
        }

        function showLoading() {
            document.getElementById('question-screen').classList.remove('active');
            document.getElementById('loading-screen').classList.add('active');
            setTimeout(showResult, 1500);
        }

        function showResult() {
            document.getElementById('loading-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');

            let maxScore = 0;
            let resultType = '保胎大师';
            for (const [type, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    resultType = type;
                }
            }

            const p = personalities[resultType];
            document.getElementById('result-image').src = p.image;
            document.getElementById('result-desc').textContent = p.desc;

            const tagsContainer = document.getElementById('result-tags');
            tagsContainer.innerHTML = '';
            p.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.textContent = tag;
                tagsContainer.appendChild(span);
            });

            // 填充分享卡片
            document.getElementById('share-image').src = p.image;

            // 生成二维码
            const qrContainer = document.getElementById('share-qrcode');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: 'https://mars-racing-management.github.io/Karting-MBTI/',
                width: 80,
                height: 80,
                colorDark: '#222',
                colorLight: '#fff',
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        function saveScreenshot() {
            const card = document.getElementById('share-card');

            html2canvas(card, {
                scale: 2,
                backgroundColor: '#fff',
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                const dataUrl = canvas.toDataURL('image/png');

                // 隐藏原结果内容
                document.getElementById('result-image').style.display = 'none';
                document.getElementById('result-tags').style.display = 'none';
                document.getElementById('result-desc').style.display = 'none';

                // 显示截图结果在人格图原位置
                const area = document.getElementById('screenshot-area');
                const img = document.getElementById('screenshot-img');
                img.src = dataUrl;
                area.style.display = 'block';

                // 自动下载
                const link = document.createElement('a');
                link.download = '卡丁车MBTI测试结果.png';
                link.href = dataUrl;
                link.click();
            }).catch(err => {
                alert('截图生成失败，请重试');
                console.error(err);
            });
        }

        function restartTest() {
            currentQuestion = 0;
            scores = {};
            document.getElementById('result-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
        }
    </script>
</body>
</html>
